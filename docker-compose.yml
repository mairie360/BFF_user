volumes:
  postgres-data:
  redis-data:
  bff-user-target:

networks:
  backend:

x-common-env: &common-env
  HOST: "0.0.0.0"
  PORT: 4000
  REDIS_URL: redis://redis:6379
  DB_TYPE: postgres
  DB_NAME: mairie_360_database
  DB_USER: postgres
  DB_HOST: postgres
  DB_PASSWORD: password
  DB_PORT: 5432

x-depends-on: &depends-on
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

# x-healthcheck: &healthcheck
#   test: ["CMD", "curl", "-f", "http://localhost:4000"]
#   interval: 10s
#   timeout: 5s
#   retries: 5

x-service: &service-template
  image: ghcr.io/mairie360/service_name:latest
  pull_policy: always
  restart: always
  expose:
    - "4000"
  networks:
    - backend
  # healthcheck:
  #   <<: *healthcheck

services:
  postgres:
    image: ghcr.io/mairie360/database:dev-latest
    restart: always
    container_name: mairie360-db-bff-user #change bff name
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: mairie_360_database
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  liquibase:
    image: ghcr.io/mairie360/liquibase-migrations:dev-latest
    container_name: mairie360-liquibase-bff-user #change bff name
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      LIQUIBASE_COMMAND_URL: jdbc:postgresql://postgres:5432/mairie_360_database
      LIQUIBASE_COMMAND_USERNAME: ${DB_USER:-postgres}
      LIQUIBASE_COMMAND_PASSWORD: ${DB_PASSWORD:-password}
      LIQUIBASE_SEARCH_PATH: /liquibase/changelog
    command: >
      --changelog-file=changelog.xml
      update
    networks:
      - backend

  redis:
    image: redis:8.4.0-bookworm
    container_name: mairie360-redis-bff-user #change bff name
    restart: always
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  core:
    container_name: core-bff-user-developpement
    image: ghcr.io/mairie360/core-api:dev-1644fa7
    ports:
      - "3000:3000"
    networks:
      - backend
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      HOST: "0.0.0.0"
      PORT: 3000
      REDIS_URL: redis://redis:6379
      DB_TYPE: postgres
      DB_NAME: mairie_360_database
      DB_USER: postgres
      DB_HOST: postgres
      DB_PASSWORD: password
      DB_PORT: 5432
      PUBLIC_URL: http://core.development.mairie360.fr
      JWT_SECRET: b"secret"
      JWT_TIMEOUT: 3600
    depends_on:
      liquibase:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"] # <--- Doit être 3000
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 10s
  
  #add other apis if needed

  bff-user:
    container_name: bff-user-developpement
    build:
      context: .
      dockerfile: development.Dockerfile
    # Mode synchronisation en temps réel (Docker Compose V2)
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: rebuild
          path: package.json
    ports:
      - "4000:4000"
    networks:
      - backend
    environment:
      <<: *common-env
      # IMPORTANT : On utilise le nom du service Docker pour communiquer
      CORE_API_URL: "core" 
      CORE_API_PORT: 3000
    volumes:
      - /app/node_modules # Isolation des modules pour éviter les conflits OS (Mac/Windows vs Linux)
    depends_on:
      core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.29.1-bookworm
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    networks:
      - backend
    depends_on:
      bff-user: #change bff name
        condition: service_healthy
    extra_hosts:
          - "bff-user.development.mairie360.fr:127.0.0.1" #change bff name